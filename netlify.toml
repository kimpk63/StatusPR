[build]
  base = "frontend"
  publish = "frontend/dist"
  command = "npm install && npm run build"

[build.environment]
  # set API base after deployment
  VITE_API_BASE_URL = "https://statuspr-backend.onrender.com"

[[redirects]]
  from = "/api/*"
  to = "https://statuspr-backend.onrender.com/:splat"
  status = 200
  force = true
